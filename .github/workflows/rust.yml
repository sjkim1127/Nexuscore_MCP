name: Rust CI Matrix

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: ${{ matrix.os }} / ${{ matrix.features }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        features:
          - "--no-default-features"
          - "" # default features
          - "--features static-analysis"
          - "--features dynamic-analysis"
          - "--features emulation"
          - "--all-features"

    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM
        run: choco install llvm -y

      - name: Set LIBCLANG_PATH
        shell: powershell
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # Frida DevKit is now handled automatically via the "auto-download" feature in Cargo.toml.
      # No manual setup steps are required here.

      - name: Run Cargo Check
        run: cargo check ${{ matrix.features }}

      - name: Run Cargo Test
        run: cargo test ${{ matrix.features }}
        # We no longer suppress errors here to ensure tool integrity.
        # Tools that require specific environments (e.g. Frida on Windows)
        # should use #[cfg(all(windows, feature = "dynamic-analysis"))] to skip in CI.

      - name: Tool Health Check (Integrity & Invocability)
        if: contains(matrix.features, '--all-features') || contains(matrix.features, 'emulation')
        run: cargo test --test tool_validation --test tool_invocation_tests ${{ matrix.features }}
