name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    # 1. Install LLVM (Required for bindgen)
    - name: Install LLVM and Clang
      run: choco install llvm -y

    - name: Set LIBCLANG_PATH
      shell: powershell
      run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

    # 2. Setup Frida DevKit
    - name: Setup Frida DevKit
      shell: powershell
      run: |
        $frida_version = "16.5.11"
        $url = "https://github.com/frida/frida/releases/download/$frida_version/frida-core-devkit-$frida_version-windows-x86_64.tar.xz"
        $output = "$env:GITHUB_WORKSPACE\frida-devkit.tar.xz"
        $extractRoot = "$env:GITHUB_WORKSPACE\frida-temp"
        
        Write-Host "Downloading Frida DevKit v$frida_version..."
        Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
        
        New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
        
        # Extract using 7z
        & "7z" x $output -o"$env:GITHUB_WORKSPACE" -y
        $tarFile = $output.Replace(".xz", "")
        & "7z" x $tarFile -o"$extractRoot" -y
        
        # Find the actual directory containing frida-core.h
        $header = Get-ChildItem -Path $extractRoot -Filter "frida-core.h" -Recurse | Select-Object -First 1
        if ($header) {
            $devkitPath = $header.Directory.FullName
        } else {
            $devkitPath = $extractRoot
        }
        
        Write-Host "Frida DevKit found at: $devkitPath"
        
        # Set environment variables for frida-sys build
        echo "FRIDA_CORE_DEVKIT=$devkitPath" >> $env:GITHUB_ENV
        $clangInclude = "-I" + $devkitPath.Replace("\", "/")
        echo "BINDGEN_EXTRA_CLANG_ARGS=$clangInclude" >> $env:GITHUB_ENV

    # 3. Build
    - name: Build
      run: cargo build --release --verbose
      env:
        FRIDA_CORE_DEVKIT: ${{ env.FRIDA_CORE_DEVKIT }}
        BINDGEN_EXTRA_CLANG_ARGS: ${{ env.BINDGEN_EXTRA_CLANG_ARGS }}

    # 4. Run tests (allow failure for now)
    - name: Run tests
      run: cargo test --verbose
      continue-on-error: true
      env:
        FRIDA_CORE_DEVKIT: ${{ env.FRIDA_CORE_DEVKIT }}
        BINDGEN_EXTRA_CLANG_ARGS: ${{ env.BINDGEN_EXTRA_CLANG_ARGS }}

    # 5. Clippy lint
    - name: Clippy
      run: cargo clippy -- -D warnings
      continue-on-error: true
      env:
        FRIDA_CORE_DEVKIT: ${{ env.FRIDA_CORE_DEVKIT }}
        BINDGEN_EXTRA_CLANG_ARGS: ${{ env.BINDGEN_EXTRA_CLANG_ARGS }}
